services:
  - type: worker
    name: Cache
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: /data/bot.sqlite3
      - key: RETENTION_DAYS
        value: 180
      - key: COMMAND_PREFIX
        value: "-"
      - key: SERVER_LOG_CHANNEL_NAME
        value: server-log
      - key: AUTO_SYNC_ALL_GUILDS
        value: "1"
      - key: SYNC_GUILD_ID
        sync: false
      - key: OWNER_IDS
        sync: false
